name: Update Star History Chart

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest star history SVG
        run: |
          curl -sSL --fail \
            "https://api.star-history.com/svg?repos=4riful/xetta-web-appsec-field-manual&type=Date&legend=top-left" \
            -o assets/star-history.svg

      - name: Generate PNG chart for GitHub README
        run: |
          python -m pip install --upgrade pip pillow
          python scripts/generate-star-history-png.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets/star-history.svg assets/star-history.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/star-history.svg assets/star-history.png
            git commit -m "chore: refresh star history chart"
            git push
          else
            echo "No changes to star history chart."
          fi
